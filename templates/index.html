<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>My Flask Blog</title>
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>
<h1>Welcome to My Flask Blog!</h1>

<div style="text-align: center; margin-bottom: 20px;">
    <a href="{{ url_for('blog.add') }}">Add a new post</a>
</div>

{% for post in posts %}
<div class="post">
    <h2>{{ post.title }}</h2>
    <p><em>Written by ... {{ post.author }}</em></p>
    <p>{{ post.content }}</p>
    <a href="{{ url_for('blog.delete', post_id=post.id) }}" style="color: red; text-decoration: none;">Delete</a>
</div>
{% endfor %}
</body>
</html>
