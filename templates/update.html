<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Update Blog Post</title>
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>
<h1>Update Blog Post</h1>

<div class="post">
    <form action="{{ url_for('blog.update', post_id=post.id) }}" method="POST">
        <p>
            <label for="author">Author:</label><br>
            <input id="author" name="author" required type="text" value="{{ post.author }}">
        </p>
        <p>
            <label for="title">Title:</label><br>
            <input id="title" name="title" required type="text" value="{{ post.title }}">
        </p>
        <p>
            <label for="content">Content:</label><br>
            <textarea id="content" name="content" required rows="5" style="width:75%;">{{ post.content }}</textarea>
        </p>
        <button type="submit">Update Post</button>
    </form>
</div>
<div style="text-align: center;">
    <a href="{{ url_for('blog.index') }}">Back to Home</a>
</div>
</body>
</html>
